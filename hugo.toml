baseURL = "https://aidigest.kikihuang.net/"
title = "AI Digest | Kiki's AI Builder Feed"
languageCode = "zh-cn"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  description = "AI 行业日报与周报，追踪顶级 AI Builder 的最新动态"
  author = "Kiki"

  [params.homeInfoParams]
    Title = "👋 AI Digest"
    Content = "追踪顶级 AI Builder 的最新动态，每日/每周精选 AI 行业资讯"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xuzhouhuang"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

